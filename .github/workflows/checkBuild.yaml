name: Check Build

on:
  push:
    branches: [main, future]
  pull_request:
    branches: [main, future]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install TypeScript
        run: npm install -g typescript

      - name: Check TypeScript compilation
        run: tsc --noEmit
